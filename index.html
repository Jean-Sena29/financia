<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pessoais</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; transition: background 0.3s; }

  /* ===== LIGHT MODE (padrão) ===== */
  :root {
    --accent: #1a7f5a; --accent-light: #e8f5f0; --accent-dark: #0f5c40;
    --danger: #d93025; --warn: #f29900; --info: #1a73e8;
    --color-background-app: #f0f0f0;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f5;
    --color-background-tertiary: #ebebeb;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #666666;
    --color-border-secondary: #dddddd;
    --color-border-tertiary: #eeeeee;
    --modal-bg: #ffffff;
    --overlay-bg: rgba(0,0,0,0.6);
    --input-bg: #f5f5f5;
    --input-border: #dddddd;
    --btn-cancel-bg: #f0f0f0;
    --btn-cancel-color: #555;
    --header-bg: #1a7f5a;
    --salary-card-bg: #e8f5f033;
    --table-total-bg: #f5f5f5;
    --toggle-track: #ccc;
    --toggle-thumb: #fff;
    --toggle-icon: '☀️';
  }

  /* ===== DARK MODE ===== */
  html.dark {
    --color-background-app: #0d0d0d;
    --color-background-primary: #1a1a1a;
    --color-background-secondary: #242424;
    --color-background-tertiary: #2e2e2e;
    --color-text-primary: #e8e8e8;
    --color-text-secondary: #999999;
    --color-border-secondary: #383838;
    --color-border-tertiary: #2e2e2e;
    --modal-bg: #1e1e1e;
    --overlay-bg: rgba(0,0,0,0.85);
    --input-bg: #2a2a2a;
    --input-border: #3a3a3a;
    --btn-cancel-bg: #2e2e2e;
    --btn-cancel-color: #aaa;
    --header-bg: #0f5c40;
    --salary-card-bg: rgba(26,127,90,0.15);
    --table-total-bg: #242424;
    --toggle-track: #1a7f5a;
    --toggle-thumb: #fff;
    --toggle-icon: '🌙';
  }
  html.dark body { background: var(--color-background-app); }

  .app { max-width: 430px; margin: 0 auto; background: var(--color-background-primary); min-height: 100vh; display: flex; flex-direction: column; transition: background 0.3s; }

  /* ===== DARK MODE TOGGLE ===== */
  .dark-toggle-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dark-toggle-label {
    font-size: 12px;
    opacity: 0.8;
    user-select: none;
    cursor: pointer;
  }
  .dark-toggle {
    position: relative;
    width: 42px;
    height: 24px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .dark-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .dark-toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    transition: background 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .dark-toggle input:checked + .dark-toggle-track { background: rgba(0,0,0,0.4); }
  .dark-toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    user-select: none;
  }
  .dark-toggle input:checked ~ .dark-toggle-thumb { transform: translateX(18px); }

  /* Header */
  .header { background: var(--header-bg); color: #fff; padding: 20px 16px 14px; transition: background 0.3s; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.3px; }
  .header-month { font-size: 13px; opacity: 0.8; }
  .month-nav { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .month-nav button { background: rgba(0,0,0,0.2); border: none; color: #fff; border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .month-nav span { flex: 1; text-align: center; font-size: 15px; font-weight: 500; }

  /* Summary cards */
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 12px; background: var(--color-background-primary); transition: background 0.3s; }
  .sum-card { background: var(--color-background-secondary); border-radius: 12px; padding: 12px; transition: background 0.3s; }
  .sum-card.full { grid-column: span 2; }
  .sum-label { font-size: 11px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .sum-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .sum-value.green { color: var(--accent); }
  .sum-value.red { color: var(--danger); }
  .sum-value.blue { color: var(--info); }
  .sum-value.warn { color: var(--warn); }
  .sum-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); position: sticky; top: 0; z-index: 10; transition: background 0.3s, border-color 0.3s; }
  .tab { flex: 1; padding: 10px 4px; font-size: 12px; font-weight: 500; text-align: center; border: none; background: none; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Section */
  .section { padding: 0 12px 12px; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 14px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Table */
  .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .fin-table th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
  .fin-table td { padding: 9px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .fin-table tr:last-child td { border-bottom: none; background: var(--table-total-bg); }
  .fin-table .amount { text-align: right; font-weight: 500; }
  .fin-table .amount.positive { color: var(--accent); }
  .fin-table .amount.negative { color: var(--danger); }
  .fin-table .amount.neutral { color: var(--info); }
  .cat-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .table-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }

  /* Transaction list */
  .tx-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; }
  .tx-item:last-child { border-bottom: none; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-text-primary); }
  .tx-date { font-size: 11px; color: var(--color-text-secondary); }
  .tx-amount { font-size: 14px; font-weight: 500; white-space: nowrap; }

  /* Add button */
  .add-btn { position: fixed; bottom: 20px; right: calc(50% - 215px + 16px); width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 14px rgba(26,127,90,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform 0.2s; }
  .add-btn:active { transform: scale(0.93); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--overlay-bg);
    z-index: 9999; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--modal-bg); border-radius: 20px 20px 0 0;
    padding: 20px 16px 36px; width: 100%; max-width: 430px;
    transform: translateY(100%); transition: transform 0.3s, background 0.3s;
    position: relative; z-index: 10000;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; text-align: center; color: var(--color-text-primary); }
  .modal-handle { width: 40px; height: 4px; background: var(--color-border-secondary); border-radius: 2px; margin: 0 auto 16px; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--input-border); border-radius: 10px; font-size: 15px; background: var(--input-bg); color: var(--color-text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; transition: background 0.3s, border-color 0.3s, color 0.3s; }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .type-btn { padding: 8px 4px; border-radius: 10px; border: 0.5px solid var(--input-border); background: var(--input-bg); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; color: var(--color-text-secondary); }
  .type-btn.active-gasto { background: #fff0f0; border-color: var(--danger); color: var(--danger); }
  html.dark .type-btn.active-gasto { background: rgba(217,48,37,0.15); }
  .type-btn.active-poupanca { background: #e8f5f0; border-color: var(--accent); color: var(--accent); }
  html.dark .type-btn.active-poupanca { background: rgba(26,127,90,0.2); }
  .type-btn.active-investimento { background: #e8f2ff; border-color: var(--info); color: var(--info); }
  html.dark .type-btn.active-investimento { background: rgba(26,115,232,0.15); }
  .cat-selector { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .cat-btn { padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--input-border); background: var(--input-bg); font-size: 12px; cursor: pointer; transition: all 0.15s; color: var(--color-text-secondary); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .submit-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .submit-btn:active { background: var(--accent-dark); }

  /* Annual table */
  .annual-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .annual-table th, .annual-table td { padding: 8px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); text-align: right; color: var(--color-text-primary); }
  .annual-table th:first-child, .annual-table td:first-child { text-align: left; }
  .annual-table th { font-size: 10px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
  .annual-table .highlight { background: rgba(26,127,90,0.08); }
  .annual-table .positive { color: var(--accent); }
  .annual-table .negative { color: var(--danger); }
  .annual-table .neutral { color: var(--info); }
  .annual-table tr:last-child td { border-bottom: none; font-weight: 500; background: var(--color-background-secondary); }

  /* Chart */
  .chart-wrap { position: relative; height: 180px; margin: 4px 0; }
  canvas { border-radius: 8px; }
  .empty-state { text-align: center; padding: 28px 16px; color: var(--color-text-secondary); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  .page { display: none; }
  .page.active { display: block; padding-bottom: 80px; }

  /* Salary badge in header */
  .salary-badge { display: flex; align-items: center; gap: 6px; margin-top: 8px; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 10px; cursor: pointer; }
  .salary-badge span { font-size: 13px; opacity: 0.95; flex: 1; }
  .salary-badge .edit-icon { font-size: 13px; opacity: 0.7; }

  /* Salary modal */
  .salary-modal-overlay {
    position: fixed; inset: 0; background: var(--overlay-bg);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .salary-modal-overlay.open { opacity: 1; pointer-events: all; }
  .salary-modal {
    background: var(--modal-bg); border-radius: 16px; padding: 24px 20px 20px;
    width: 320px; max-width: 90vw;
    transform: scale(0.95); transition: transform 0.2s, background 0.3s;
  }
  .salary-modal-overlay.open .salary-modal { transform: scale(1); }
  .salary-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--color-text-primary); }
  .salary-modal p { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 16px; }
  .salary-modal .form-input { margin-bottom: 12px; }
  .salary-modal-btns { display: flex; gap: 8px; }
  .salary-modal-btns button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-cancel { background: var(--btn-cancel-bg); color: var(--btn-cancel-color); transition: background 0.3s; }
  .btn-save { background: var(--accent); color: #fff; }

  /* Receita card */
  .receita-card {
    background: rgba(26,127,90,0.12) !important;
    border: 1px solid rgba(26,127,90,0.3) !important;
  }
  html.dark .receita-card {
    background: rgba(26,127,90,0.18) !important;
    border: 1px solid rgba(26,127,90,0.4) !important;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>Finanças Pessoais</h1>
      <div class="dark-toggle-wrap">
        <span class="header-month" id="header-year">2026</span>
        <!-- Toggle modo escuro -->
        <label class="dark-toggle" title="Alternar modo escuro">
          <input type="checkbox" id="dark-mode-checkbox" onchange="toggleDarkMode(this.checked)" />
          <div class="dark-toggle-track"></div>
          <div class="dark-toggle-thumb" id="toggle-thumb">☀️</div>
        </label>
      </div>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="month-label">Março</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="salary-badge" onclick="openSalaryModal()">
      <span>💰 Receita: <strong id="header-salary">Não definida</strong></span>
      <span class="edit-icon">✏️</span>
    </div>
  </div>

  <div class="summary" id="summary-cards"></div>

  <div class="tabs">
    <button class="tab active" onclick="showPage('mensal', this)">Mensal</button>
    <button class="tab" onclick="showPage('gastos', this)">Gastos</button>
    <button class="tab" onclick="showPage('anual', this)">Anual</button>
  </div>

  <!-- MENSAL -->
  <div class="page active" id="page-mensal">
    <div class="section">
      <div class="section-title">Resumo do mês</div>
      <div class="table-card">
        <table class="fin-table" id="monthly-table"></table>
      </div>
      <div class="section-title" style="margin-top:18px">Progresso de economia</div>
      <div class="table-card" style="padding:14px 12px">
        <div id="progress-section"></div>
      </div>
      <div class="section-title" style="margin-top:18px">Distribuição de gastos</div>
      <div class="table-card" style="padding:14px 12px">
        <div class="chart-wrap"><canvas id="cat-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- GASTOS -->
  <div class="page" id="page-gastos">
    <div class="section">
      <div class="section-title">Lançamentos do mês</div>
      <div class="table-card" id="tx-list"></div>
    </div>
  </div>

  <!-- ANUAL -->
  <div class="page" id="page-anual">
    <div class="section">
      <div class="section-title">Visão anual <span id="annual-year-label"></span></div>
      <div class="table-card" style="overflow-x:auto">
        <table class="annual-table" id="annual-table"></table>
      </div>
      <div class="section-title" style="margin-top:18px">Evolução mensal</div>
      <div class="table-card" style="padding:14px 12px">
        <div class="chart-wrap" style="height:200px"><canvas id="annual-chart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<!-- SALARY MODAL -->
<div class="salary-modal-overlay" id="salary-modal" onclick="handleSalaryOverlayClick(event)">
  <div class="salary-modal">
    <h3>💰 Definir Receita</h3>
    <p>Salário ou renda para <span id="salary-modal-month"></span></p>
    <input class="form-input" id="salary-input" type="number" placeholder="Ex: 3500,00" min="0" step="0.01" />
    <div class="salary-modal-btns">
      <button class="btn-cancel" onclick="closeSalaryModal()">Cancelar</button>
      <button class="btn-save" onclick="saveSalary()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo Lançamento</div>
    <div class="form-row">
      <label class="form-label">Tipo</label>
      <div class="type-selector">
        <button class="type-btn" onclick="setType('gasto', this)">Gasto</button>
        <button class="type-btn" onclick="setType('poupanca', this)">Poupança</button>
        <button class="type-btn" onclick="setType('investimento', this)">Investimento</button>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Descrição</label>
      <input class="form-input" id="tx-desc" placeholder="Ex: Supermercado, Salário..." />
    </div>
    <div class="form-row">
      <label class="form-label">Valor (R$)</label>
      <input class="form-input" id="tx-value" type="number" placeholder="0,00" min="0" step="0.01" />
    </div>
    <div class="form-row" id="cat-row" style="display:none">
      <label class="form-label">Categoria</label>
      <div class="cat-selector" id="cat-selector"></div>
    </div>
    <div class="form-row">
      <label class="form-label">Data</label>
      <input class="form-input" id="tx-date" type="date" />
    </div>
    <button class="submit-btn" onclick="addTransaction()">Registrar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS = {
  gasto: [
    {name:'Alimentação', icon:'🍔', color:'#e8593c'},
    {name:'Moradia', icon:'🏠', color:'#1a73e8'},
    {name:'Transporte', icon:'🚗', color:'#f29900'},
    {name:'Saúde', icon:'💊', color:'#e52a7b'},
    {name:'Lazer', icon:'🎮', color:'#9334e6'},
    {name:'Educação', icon:'📚', color:'#0f9d58'},
    {name:'Roupas', icon:'👕', color:'#00acc1'},
    {name:'Outros', icon:'📦', color:'#73726c'},
  ],
  poupanca: [{name:'Poupança', icon:'🏦', color:'#1a7f5a'}],
  investimento: [
    {name:'Renda Fixa', icon:'📈', color:'#1a73e8'},
    {name:'Ações', icon:'📊', color:'#9334e6'},
    {name:'FIIs', icon:'🏢', color:'#f29900'},
    {name:'Cripto', icon:'₿', color:'#e8593c'},
    {name:'Outros', icon:'💼', color:'#0f9d58'},
  ],
};

let now = new Date();
let curMonth = now.getMonth();
let curYear = now.getFullYear();
let selType = 'gasto';
let selCat = '';
let catChart = null;
let annualChart = null;

const SK = 'fintrack_v1';
const SK_SAL = 'fintrack_salaries_v1';
const SK_DARK = 'fintrack_darkmode';

function load() { try { return JSON.parse(localStorage.getItem(SK)) || []; } catch { return []; } }
function save(d) { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} }
function loadSalaries() { try { return JSON.parse(localStorage.getItem(SK_SAL)) || {}; } catch { return {}; } }
function saveSalaries(d) { try { localStorage.setItem(SK_SAL, JSON.stringify(d)); } catch {} }
function getSalaryKey(month, year) { return `${year}-${String(month+1).padStart(2,'0')}`; }
function getSalary(month, year) { return loadSalaries()[getSalaryKey(month, year)] || 0; }

// ===== DARK MODE =====
function toggleDarkMode(isDark) {
  if (isDark) {
    document.documentElement.classList.add('dark');
    document.getElementById('toggle-thumb').textContent = '🌙';
    localStorage.setItem(SK_DARK, '1');
  } else {
    document.documentElement.classList.remove('dark');
    document.getElementById('toggle-thumb').textContent = '☀️';
    localStorage.setItem(SK_DARK, '0');
  }
  // Rerender charts para aplicar cores corretas
  if (catChart || annualChart) render();
}

function initDarkMode() {
  const saved = localStorage.getItem(SK_DARK);
  // Se não houver preferência salva, checar preferência do sistema
  const prefersDark = saved !== null ? saved === '1' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  const checkbox = document.getElementById('dark-mode-checkbox');
  checkbox.checked = prefersDark;
  toggleDarkMode(prefersDark);
}

function isDark() { return document.documentElement.classList.contains('dark'); }

function getChartColors() {
  return isDark()
    ? { grid: 'rgba(255,255,255,0.08)', tick: '#888', legend: '#aaa' }
    : { grid: 'rgba(0,0,0,0.05)', tick: '#666', legend: '#555' };
}

function seedDemo() {
  const d = load();
  if (d.length > 0) return;
  const y = curYear, m = curMonth;
  const demo = [
    {id:1, type:'gasto', cat:'Alimentação', desc:'Supermercado', value:450, date:`${y}-${String(m+1).padStart(2,'0')}-05`},
    {id:2, type:'gasto', cat:'Moradia', desc:'Aluguel', value:1200, date:`${y}-${String(m+1).padStart(2,'0')}-01`},
    {id:3, type:'gasto', cat:'Transporte', desc:'Combustível', value:180, date:`${y}-${String(m+1).padStart(2,'0')}-10`},
    {id:4, type:'gasto', cat:'Lazer', desc:'Cinema', value:60, date:`${y}-${String(m+1).padStart(2,'0')}-12`},
    {id:5, type:'gasto', cat:'Alimentação', desc:'Restaurante', value:120, date:`${y}-${String(m+1).padStart(2,'0')}-15`},
    {id:6, type:'poupanca', cat:'Poupança', desc:'Reserva mensal', value:500, date:`${y}-${String(m+1).padStart(2,'0')}-05`},
    {id:7, type:'investimento', cat:'Renda Fixa', desc:'CDB 120% CDI', value:800, date:`${y}-${String(m+1).padStart(2,'0')}-05`},
    {id:8, type:'investimento', cat:'Ações', desc:'PETR4', value:300, date:`${y}-${String(m+1).padStart(2,'0')}-08`},
  ];
  for (let i = 1; i <= 5; i++) {
    let pm = m - i; let py = y;
    if (pm < 0) { pm += 12; py--; }
    const ms = String(pm + 1).padStart(2,'0');
    demo.push({id:100+i, type:'gasto', cat:'Moradia', desc:'Aluguel', value:1200, date:`${py}-${ms}-01`});
    demo.push({id:200+i, type:'gasto', cat:'Alimentação', desc:'Mercado', value:350+i*20, date:`${py}-${ms}-10`});
    demo.push({id:300+i, type:'poupanca', cat:'Poupança', desc:'Reserva', value:300+i*50, date:`${py}-${ms}-05`});
    demo.push({id:400+i, type:'investimento', cat:'Renda Fixa', desc:'CDB', value:500+i*100, date:`${py}-${ms}-05`});
  }
  save(demo);
}

function getMonthTxs(month, year) {
  return load().filter(t => {
    const d = new Date(t.date + 'T00:00:00');
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

function fmt(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function renderSummary() {
  const txs = getMonthTxs(curMonth, curYear);
  const gastos = txs.filter(t => t.type === 'gasto').reduce((a,t) => a + t.value, 0);
  const poupanca = txs.filter(t => t.type === 'poupanca').reduce((a,t) => a + t.value, 0);
  const invest = txs.filter(t => t.type === 'investimento').reduce((a,t) => a + t.value, 0);
  const economia = poupanca + invest;
  const salario = getSalary(curMonth, curYear);
  const saldo = salario > 0 ? salario - gastos - economia : null;
  const pctGasto = salario > 0 ? Math.round((gastos / salario) * 100) : 0;
  const pctEco = salario > 0 ? Math.round((economia / salario) * 100) : 0;

  document.getElementById('header-salary').textContent = salario > 0 ? fmt(salario) : 'Não definida';

  document.getElementById('summary-cards').innerHTML = `
    ${salario > 0 ? `
    <div class="sum-card full receita-card">
      <div class="sum-label" style="color:#1a7f5a">Receita do mês</div>
      <div class="sum-value green">${fmt(salario)}</div>
      <div class="sum-sub" style="color:#1a7f5a">Clique em "Receita" no topo para editar</div>
    </div>` : ''}
    <div class="sum-card">
      <div class="sum-label">Gastos</div>
      <div class="sum-value red">${fmt(gastos)}</div>
      <div class="sum-sub">${txs.filter(t=>t.type==='gasto').length} transações${salario>0?' · '+pctGasto+'% da renda':''}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Economias</div>
      <div class="sum-value green">${fmt(economia)}</div>
      <div class="sum-sub">Poupança + Invest.${salario>0?' · '+pctEco+'% da renda':''}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Poupança</div>
      <div class="sum-value green">${fmt(poupanca)}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Investimento</div>
      <div class="sum-value blue">${fmt(invest)}</div>
    </div>
    ${salario > 0 ? `
    <div class="sum-card full">
      <div class="sum-label">Saldo disponível</div>
      <div class="sum-value ${saldo >= 0 ? 'green' : 'red'}">${fmt(saldo)}</div>
      <div class="progress-bar" style="margin-top:6px">
        <div class="progress-fill" style="width:${Math.min(pctGasto,100)}%;background:#d93025"></div>
      </div>
      <div class="sum-sub" style="margin-top:4px">${pctGasto}% da renda gasto · meta: gastar menos de 80%</div>
    </div>` : `
    <div class="sum-card full">
      <div class="sum-label">Taxa de economia</div>
      <div class="sum-value ${pctEco >= 20 ? 'green' : pctEco >= 10 ? 'warn' : 'red'}">${pctEco}%</div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${Math.min(pctEco,100)}%;background:${pctEco>=20?'#1a7f5a':pctEco>=10?'#f29900':'#d93025'}"></div></div>
      <div class="sum-sub" style="margin-top:4px">Meta recomendada: 20% da renda · <a onclick="openSalaryModal()" style="color:#1a7f5a;cursor:pointer;text-decoration:underline">Definir receita</a></div>
    </div>`}
  `;
}

function renderMonthly() {
  const txs = getMonthTxs(curMonth, curYear);
  const gastos = txs.filter(t => t.type === 'gasto').reduce((a,t) => a + t.value, 0);
  const poupanca = txs.filter(t => t.type === 'poupanca').reduce((a,t) => a + t.value, 0);
  const invest = txs.filter(t => t.type === 'investimento').reduce((a,t) => a + t.value, 0);
  const total = gastos + poupanca + invest;
  const salario = getSalary(curMonth, curYear);
  const saldo = salario > 0 ? salario - gastos - poupanca - invest : null;

  const pctOf = (v, base) => base > 0 ? Math.round(v/base*100)+'%' : (total>0 ? Math.round(v/total*100)+'%' : '0%');
  const base = salario > 0 ? salario : total;

  document.getElementById('monthly-table').innerHTML = `
    <tr><th>Categoria</th><th style="text-align:right">Valor</th><th style="text-align:right">${salario>0?'% Renda':'%'}</th></tr>
    ${salario > 0 ? `<tr style="background:rgba(26,127,90,0.08)"><td style="color:#1a7f5a;font-weight:500">💰 Receita</td><td class="amount positive">${fmt(salario)}</td><td class="amount positive">100%</td></tr>` : ''}
    <tr><td>Gastos totais</td><td class="amount negative">${fmt(gastos)}</td><td class="amount negative">${pctOf(gastos,base)}</td></tr>
    <tr><td>Poupança</td><td class="amount positive">${fmt(poupanca)}</td><td class="amount positive">${pctOf(poupanca,base)}</td></tr>
    <tr><td>Investimentos</td><td class="amount neutral">${fmt(invest)}</td><td class="amount neutral">${pctOf(invest,base)}</td></tr>
    ${salario > 0 ? `<tr><td style="font-weight:500">Saldo final</td><td class="amount ${saldo>=0?'positive':'negative'}" style="font-weight:500">${fmt(saldo)}</td><td class="amount ${saldo>=0?'positive':'negative'}">${pctOf(Math.abs(saldo),salario)}</td></tr>` : `<tr><td style="font-weight:500">Total movimentado</td><td class="amount" style="font-weight:500">${fmt(total)}</td><td class="amount">100%</td></tr>`}
  `;

  const catTotals = {};
  txs.filter(t=>t.type==='gasto').forEach(t => { catTotals[t.cat] = (catTotals[t.cat]||0) + t.value; });
  const catArr = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);

  document.getElementById('progress-section').innerHTML = catArr.length ? catArr.map(([cat, val]) => {
    const ci = CATS.gasto.find(c=>c.name===cat) || {color:'#888'};
    const pct = gastos > 0 ? Math.round(val/gastos*100) : 0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--color-text-primary)">${cat}</span><span style="color:var(--color-text-secondary)">${fmt(val)} (${pct}%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${ci.color}"></div></div></div>`;
  }).join('') : '<div class="empty-state"><div class="empty-icon">📊</div>Nenhum gasto registrado</div>';

  if (catChart) catChart.destroy();
  const ctx = document.getElementById('cat-chart').getContext('2d');
  const cc = getChartColors();
  if (catArr.length) {
    catChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: catArr.map(c=>c[0]),
        datasets: [{ data: catArr.map(c=>c[1]), backgroundColor: catArr.map(c=>(CATS.gasto.find(x=>x.name===c[0])||{color:'#888'}).color), borderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true, position: 'right',
            labels: { font: { size: 11 }, boxWidth: 10, padding: 8, color: cc.legend }
          }
        }
      }
    });
  }
}

function renderTransactions() {
  const txs = getMonthTxs(curMonth, curYear).sort((a,b) => new Date(b.date) - new Date(a.date));
  if (!txs.length) {
    document.getElementById('tx-list').innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div>Nenhum lançamento neste mês<br><br>Toque em + para adicionar</div>';
    return;
  }
  document.getElementById('tx-list').innerHTML = txs.map(t => {
    const cats = CATS[t.type] || [];
    const ci = cats.find(c=>c.name===t.cat) || {icon:'💰',color:'#888'};
    const isGasto = t.type === 'gasto';
    const color = isGasto ? '#d93025' : t.type === 'investimento' ? '#1a73e8' : '#1a7f5a';
    const sign = isGasto ? '-' : '+';
    const d = new Date(t.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
    return `<div class="tx-item" onclick="deletePrompt(${t.id})">
      <div class="tx-icon" style="background:${ci.color}22;color:${ci.color}">${ci.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${t.desc}</div>
        <div class="tx-date">${t.cat} · ${dateStr}</div>
      </div>
      <div class="tx-amount" style="color:${color}">${sign}${fmt(t.value)}</div>
    </div>`;
  }).join('');
}

function renderAnnual() {
  const year = curYear;
  document.getElementById('annual-year-label').textContent = year;
  document.getElementById('header-year').textContent = year;
  const all = load().filter(t => new Date(t.date + 'T00:00:00').getFullYear() === year);

  let rows = '';
  let totG = 0, totP = 0, totI = 0, totE = 0, totS = 0;
  const mGastos = [], mEco = [], mSalary = [];

  for (let m = 0; m < 12; m++) {
    const mtxs = all.filter(t => new Date(t.date + 'T00:00:00').getMonth() === m);
    const g = mtxs.filter(t=>t.type==='gasto').reduce((a,t)=>a+t.value,0);
    const p = mtxs.filter(t=>t.type==='poupanca').reduce((a,t)=>a+t.value,0);
    const iv = mtxs.filter(t=>t.type==='investimento').reduce((a,t)=>a+t.value,0);
    const eco = p + iv;
    const sal = getSalary(m, year);
    totG+=g; totP+=p; totI+=iv; totE+=eco; totS+=sal;
    mGastos.push(g); mEco.push(eco); mSalary.push(sal);
    const isCur = m === curMonth;
    const hasTx = g > 0 || p > 0 || iv > 0 || sal > 0;
    const saldo = sal > 0 ? sal - g - eco : null;
    rows += `<tr class="${isCur ? 'highlight' : ''}">
      <td style="${isCur?'font-weight:500':''}${!hasTx?';opacity:0.4':''}">${MONTHS[m].substring(0,3)}</td>
      <td class="${sal>0?'positive':''}" style="${!hasTx?'opacity:0.4':''}">${sal>0?fmt(sal):'-'}</td>
      <td class="${g>0?'negative':''}" style="${!hasTx?'opacity:0.4':''}">${g>0?fmt(g):'-'}</td>
      <td class="${eco>0?'positive':''}" style="${!hasTx?'opacity:0.4':''}">${eco>0?fmt(eco):'-'}</td>
      <td class="${saldo!==null?(saldo>=0?'positive':'negative'):''}" style="${!hasTx?'opacity:0.4':''}">${saldo!==null?fmt(saldo):'-'}</td>
    </tr>`;
  }
  const totSaldo = totS > 0 ? totS - totG - totE : null;
  rows += `<tr><td>Total</td><td class="positive">${totS>0?fmt(totS):'-'}</td><td class="negative">${totG>0?fmt(totG):'-'}</td><td class="positive">${totE>0?fmt(totE):'-'}</td><td class="${totSaldo!==null?(totSaldo>=0?'positive':'negative'):''}">${totSaldo!==null?fmt(totSaldo):'-'}</td></tr>`;
  document.getElementById('annual-table').innerHTML = `<tr><th>Mês</th><th>Receita</th><th>Gastos</th><th>Economia</th><th>Saldo</th></tr>${rows}`;

  if (annualChart) annualChart.destroy();
  const ctx2 = document.getElementById('annual-chart').getContext('2d');
  const cc = getChartColors();
  const datasets = [
    { label: 'Gastos', data: mGastos, backgroundColor: '#d9302533', borderColor: '#d93025', borderWidth: 1.5, borderRadius: 4 },
    { label: 'Economia', data: mEco, backgroundColor: '#1a7f5a33', borderColor: '#1a7f5a', borderWidth: 1.5, borderRadius: 4 },
  ];
  if (mSalary.some(s => s > 0)) {
    datasets.unshift({ label: 'Receita', data: mSalary, backgroundColor: '#1a73e833', borderColor: '#1a73e8', borderWidth: 1.5, borderRadius: 4 });
  }
  annualChart = new Chart(ctx2, {
    type: 'bar',
    data: { labels: MONTHS.map(m=>m.substring(0,3)), datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 10, padding: 10, color: cc.legend } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: cc.tick } },
        y: { grid: { color: cc.grid }, ticks: { font: { size: 10 }, color: cc.tick, callback: v => 'R$'+v.toLocaleString('pt-BR') } }
      }
    }
  });
}

function render() {
  document.getElementById('month-label').textContent = MONTHS[curMonth];
  document.getElementById('header-year').textContent = curYear;
  renderSummary();
  renderMonthly();
  renderTransactions();
  renderAnnual();
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth < 0) { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0; curYear++; }
  render();
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

let selCatBtn = null;
function openModal() {
  const today = new Date();
  const mm = String(curMonth + 1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('tx-date').value = `${curYear}-${mm}-${dd}`;
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-value').value = '';
  selType = 'gasto'; selCat = ''; selCatBtn = null;
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  document.querySelectorAll('.type-btn')[0].className = 'type-btn active-gasto';
  buildCatSelector();
  document.getElementById('modal').classList.add('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function setType(type, btn) {
  selType = type; selCat = ''; selCatBtn = null;
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  btn.className = `type-btn active-${type}`;
  buildCatSelector();
}

function buildCatSelector() {
  const cats = CATS[selType] || [];
  const row = document.getElementById('cat-row');
  const sel = document.getElementById('cat-selector');
  row.style.display = cats.length > 1 ? 'block' : 'none';
  sel.innerHTML = cats.map(c => `<button class="cat-btn" onclick="selectCat('${c.name}', this)">${c.icon} ${c.name}</button>`).join('');
  if (cats.length === 1) { selCat = cats[0].name; }
}

function selectCat(cat, btn) {
  selCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addTransaction() {
  const desc = document.getElementById('tx-desc').value.trim();
  const value = parseFloat(document.getElementById('tx-value').value);
  const date = document.getElementById('tx-date').value;
  if (!desc) { alert('Informe a descrição'); return; }
  if (!value || value <= 0) { alert('Informe um valor válido'); return; }
  if (!date) { alert('Informe a data'); return; }
  const cats = CATS[selType] || [];
  const cat = selCat || (cats[0] && cats[0].name) || 'Outros';
  const data = load();
  data.push({ id: Date.now(), type: selType, cat, desc, value, date });
  save(data);
  closeModal();
  render();
}

function deletePrompt(id) {
  if (confirm('Remover este lançamento?')) {
    const data = load().filter(t => t.id !== id);
    save(data);
    render();
  }
}

function openSalaryModal() {
  const sal = getSalary(curMonth, curYear);
  document.getElementById('salary-input').value = sal > 0 ? sal : '';
  document.getElementById('salary-modal-month').textContent = MONTHS[curMonth] + ' ' + curYear;
  document.getElementById('salary-modal').classList.add('open');
  setTimeout(() => document.getElementById('salary-input').focus(), 300);
}
function closeSalaryModal() { document.getElementById('salary-modal').classList.remove('open'); }
function handleSalaryOverlayClick(e) { if (e.target === document.getElementById('salary-modal')) closeSalaryModal(); }
function saveSalary() {
  const val = parseFloat(document.getElementById('salary-input').value);
  if (isNaN(val) || val < 0) { alert('Informe um valor válido'); return; }
  const sals = loadSalaries();
  if (val === 0) { delete sals[getSalaryKey(curMonth, curYear)]; }
  else { sals[getSalaryKey(curMonth, curYear)] = val; }
  saveSalaries(sals);
  closeSalaryModal();
  render();
}

// Init
seedDemo();
initDarkMode();
render();
</script>
</body>
</html>
